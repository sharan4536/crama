<title>Get Started Intro Screen</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

            theme: {
                extend: {

                        "primary": "#57a29b",
                        "background-light": "#f6f7f7",

                    fontFamily: {

</div>

<div class="flex w-full flex-row items-center justify-center gap-3 py-6">

<div class="text-center w-full max-w-md mx-auto mb-8">
<h1 class="text-white tracking-tight text-[32px] font-extrabold leading-tight pb-3">

<p class="text-white/90 text-base font-medium leading-relaxed">

                    </p>

<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-white text-primary text-lg font-bold leading-normal tracking-[0.015em] shadow-lg hover:bg-white/95 transition-colors">

<a class="text-white/90 text-sm font-medium hover:text-white transition-colors py-2" href="#">

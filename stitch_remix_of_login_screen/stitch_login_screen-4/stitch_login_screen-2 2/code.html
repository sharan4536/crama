<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Boutique App - Sign Up</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                "primary": "#58A39B",
                "background-light": "#f8f6f7",
                "background-dark": "#221019",
                },
                fontFamily: {
                "display": ["Plus Jakarta Sans", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                backgroundImage: {
                    'custom-gradient': 'linear-gradient(to bottom, #58A39B 41%, #92B3A9 81%)',
                }
            },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-custom-gradient font-display text-[#181114] dark:text-white antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-white/90 backdrop-blur-sm sm:bg-white/95">
<div class="flex flex-col items-center pt-8 px-6">
<div class="h-20 w-20 rounded-2xl bg-white dark:bg-white/10 shadow-sm flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-primary">checkroom</span>
</div>
<h1 class="text-[#181114] dark:text-white tracking-tight text-[28px] font-bold leading-tight text-center">
            Create Account
        </h1>
<p class="text-[#896175] dark:text-gray-400 text-base font-medium leading-normal pt-2 text-center">
            Register your boutique to get started
        </p>
</div>
<div class="flex-1 w-full max-w-[480px] mx-auto px-4 py-6 flex flex-col gap-5">
<label class="flex flex-col w-full">
<span class="text-[#181114] dark:text-gray-200 text-sm font-semibold leading-normal pb-2">Boutique Name</span>
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#181114] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#e6dbe0] dark:border-gray-700 bg-white dark:bg-white/5 focus:border-primary h-14 placeholder:text-[#896175] dark:placeholder:text-gray-500 px-[15px] text-base font-normal leading-normal transition-colors" placeholder="e.g., Chic Styles" type="text"/>
</label>
<label class="flex flex-col w-full">
<span class="text-[#181114] dark:text-gray-200 text-sm font-semibold leading-normal pb-2">Owner Name</span>
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#181114] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#e6dbe0] dark:border-gray-700 bg-white dark:bg-white/5 focus:border-primary h-14 placeholder:text-[#896175] dark:placeholder:text-gray-500 px-[15px] text-base font-normal leading-normal transition-colors" placeholder="Your full name" type="text"/>
</label>
<label class="flex flex-col w-full">
<span class="text-[#181114] dark:text-gray-200 text-sm font-semibold leading-normal pb-2">Mobile Number</span>
<div class="relative flex w-full rounded-xl border border-[#e6dbe0] dark:border-gray-700 bg-white dark:bg-white/5 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all overflow-hidden h-14">
<div class="flex items-center justify-center px-4 bg-gray-50 dark:bg-white/10 border-r border-[#e6dbe0] dark:border-gray-700">
<span class="text-[#181114] dark:text-white font-medium">+91</span>
</div>
<input class="form-input flex-1 border-none bg-transparent h-full text-[#181114] dark:text-white focus:ring-0 placeholder:text-[#896175] dark:placeholder:text-gray-500 px-[15px] text-base font-normal leading-normal" placeholder="98765 43210" type="tel"/>
</div>
</label>
<label class="flex flex-col w-full">
<span class="text-[#181114] dark:text-gray-200 text-sm font-semibold leading-normal pb-2">Email Address</span>
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#181114] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#e6dbe0] dark:border-gray-700 bg-white dark:bg-white/5 focus:border-primary h-14 placeholder:text-[#896175] dark:placeholder:text-gray-500 px-[15px] text-base font-normal leading-normal transition-colors" placeholder="name@example.com" type="email"/>
</label>
<label class="flex flex-col w-full">
<span class="text-[#181114] dark:text-gray-200 text-sm font-semibold leading-normal pb-2">Password</span>
<div class="relative">
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#181114] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#e6dbe0] dark:border-gray-700 bg-white dark:bg-white/5 focus:border-primary h-14 placeholder:text-[#896175] dark:placeholder:text-gray-500 pl-[15px] pr-12 text-base font-normal leading-normal transition-colors" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-0 h-full px-4 text-[#896175] hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<label class="flex flex-col w-full">
<span class="text-[#181114] dark:text-gray-200 text-sm font-semibold leading-normal pb-2">Confirm Password</span>
<div class="relative">
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#181114] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#e6dbe0] dark:border-gray-700 bg-white dark:bg-white/5 focus:border-primary h-14 placeholder:text-[#896175] dark:placeholder:text-gray-500 pl-[15px] pr-12 text-base font-normal leading-normal transition-colors" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-0 h-full px-4 text-[#896175] hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</label>
<button class="mt-4 flex w-full items-center justify-center rounded-xl bg-primary h-14 px-6 text-white text-base font-bold leading-normal shadow-md hover:bg-primary/90 transition-all active:scale-[0.98]">
            Sign Up
        </button>
<div class="text-center pb-8">
<p class="text-[#896175] dark:text-gray-400 text-sm font-medium">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Login</a>
</p>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Inventory Item</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#58A39B",
                        "primary-light": "#92B3A9",
                        "background-light": "#f6f7f7",
                        "background-dark": "#161c1b",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Manrope", "Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display antialiased text-slate-800">
<!-- Main Container with Gradient Background -->
<div class="relative flex h-screen w-full flex-col overflow-hidden" style="background: linear-gradient(180deg, #58A39B 0%, #58A39B 41%, #92B3A9 81%, #92B3A9 100%);">
<!-- Top Navigation Bar -->
<div class="flex items-center p-4 pt-12 pb-4 justify-between bg-transparent z-10 text-white">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full bg-white/20 backdrop-blur-md hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10 shadow-sm drop-shadow-sm">
                Add Inventory
            </h2>
<div class="w-0"></div> <!-- Spacer for centering -->
</div>
<!-- Scrollable Form Content -->
<div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-32 w-full max-w-md mx-auto">
<!-- Image Upload Section -->
<div class="flex flex-col mb-4 bg-white rounded-2xl shadow-sm overflow-hidden">
<div class="flex flex-col items-center gap-4 px-6 py-8">
<div class="relative w-full border-2 border-dashed border-[#d7e0df] bg-[#f9fbfa] rounded-xl py-10 flex flex-col items-center justify-center gap-3 group transition-colors hover:border-primary/50 cursor-pointer">
<div class="size-14 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-1">
<span class="material-symbols-outlined text-[32px]">add_a_photo</span>
</div>
<div class="flex flex-col items-center gap-1">
<p class="text-[#121716] text-base font-bold text-center">Product Image</p>
<p class="text-slate-500 text-sm font-normal text-center px-4">Tap to upload a photo of the item</p>
</div>
</div>
</div>
</div>
<!-- Product Details Section -->
<div class="flex flex-col gap-4 mb-4">
<!-- Product Name -->
<div class="bg-white rounded-2xl shadow-sm p-4">
<label class="flex flex-col w-full">
<p class="text-[#121716] text-sm font-bold leading-normal pb-2 ml-1">Product Name</p>
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#121716] border-none bg-[#f6f7f7] focus:ring-2 focus:ring-primary/50 h-14 placeholder:text-slate-400 px-4 text-base font-medium leading-normal transition-all" placeholder="e.g. Silk Scarf" value=""/>
</label>
</div>
<!-- Description -->
<div class="bg-white rounded-2xl shadow-sm p-4">
<label class="flex flex-col w-full">
<p class="text-[#121716] text-sm font-bold leading-normal pb-2 ml-1">Description</p>
<textarea class="form-textarea flex w-full resize-none overflow-hidden rounded-xl text-[#121716] border-none bg-[#f6f7f7] focus:ring-2 focus:ring-primary/50 min-h-32 placeholder:text-slate-400 p-4 text-base font-normal leading-normal transition-all" placeholder="Enter product details..."></textarea>
</label>
</div>
</div>
<!-- Pricing & Inventory Section -->
<div class="bg-white rounded-2xl shadow-sm p-4 flex flex-col gap-4">
<div class="flex gap-4">
<label class="flex flex-col w-full min-w-0 flex-1">
<p class="text-[#121716] text-sm font-bold leading-normal pb-2 ml-1">Selling Price</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">$</span>
<input class="form-input flex w-full rounded-xl text-[#121716] border-none bg-[#f6f7f7] focus:ring-2 focus:ring-primary/50 h-14 placeholder:text-slate-400 pl-8 pr-4 text-base font-medium leading-normal transition-all" inputmode="decimal" placeholder="0.00" type="number"/>
</div>
</label>
<label class="flex flex-col w-full min-w-0 flex-1">
<p class="text-[#121716] text-sm font-bold leading-normal pb-2 ml-1">Cost Price</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">$</span>
<input class="form-input flex w-full rounded-xl text-[#121716] border-none bg-[#f6f7f7] focus:ring-2 focus:ring-primary/50 h-14 placeholder:text-slate-400 pl-8 pr-4 text-base font-medium leading-normal transition-all" inputmode="decimal" placeholder="0.00" type="number"/>
</div>
</label>
</div>
<div class="h-px w-full bg-slate-100 my-1"></div>
<label class="flex flex-col w-full">
<div class="flex items-center justify-between pb-2 ml-1">
<p class="text-[#121716] text-sm font-bold leading-normal">Initial Stock</p>
<span class="text-xs text-primary font-medium bg-primary/10 px-2 py-0.5 rounded-full">Required</span>
</div>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">inventory_2</span>
</div>
<input class="form-input flex w-full rounded-xl text-[#121716] border-none bg-[#f6f7f7] focus:ring-2 focus:ring-primary/50 h-14 placeholder:text-slate-400 pl-11 pr-4 text-base font-medium leading-normal transition-all" inputmode="numeric" placeholder="0" type="number"/>
</div>
</label>
</div>
</div>
<!-- Sticky Footer Action Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-slate-100 z-50">
<div class="max-w-md mx-auto">
<button class="flex w-full items-center justify-center rounded-xl h-14 bg-primary hover:bg-[#4a8c85] active:scale-[0.98] transition-all shadow-lg shadow-primary/30 text-white text-base font-bold tracking-wide">
                    Add Product to Inventory
                </button>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Boutique Billing - Splash Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#58A39B", // Updated to requested accent color
                        "background-light": "#f6f6f8",
                        "background-dark": "#141121",
                    },
                    fontFamily: {
                        "display": ["Manrope", "Noto Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    keyframes: {
                        width: {
                            '0%, 100%': { width: '30%' },
                            '50%': { width: '70%' },
                        }
                    }
                },
            },
        }
    </script>
<style>@keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.95; transform: scale(0.98); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display antialiased">
<div class="relative flex h-screen w-full flex-col items-center justify-center overflow-hidden bg-[linear-gradient(to_bottom,#58A39B_41%,#92B3A9_81%)]">
<div class="flex flex-col items-center justify-center gap-8 px-8 py-10 w-full max-w-md animate-pulse-soft">
<div class="flex items-center justify-center p-8 rounded-full bg-white shadow-xl shadow-black/5 aspect-square">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 48;">
                storefront
            </span>
</div>
<div class="flex flex-col gap-3 text-center">
<h1 class="text-white tracking-tight text-3xl font-extrabold leading-tight drop-shadow-sm">
                Boutique Billing
            </h1>
<p class="text-white/90 text-base font-medium leading-normal tracking-wide">
                Simple billing for modern boutiques
            </p>
</div>
</div>
</div>
</body></html>

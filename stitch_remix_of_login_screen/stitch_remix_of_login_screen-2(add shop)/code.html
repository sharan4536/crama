<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Shop Details</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#57a29b",
                        "background-light": "#f6f7f7",
                        "background-dark": "#161c1b",
                        "text-light": "#121716",
                        "text-dark": "#ffffff",
                        "input-border-light": "#d7e0df",
                        "input-border-dark": "#2d3837",
                        "input-bg-light": "#ffffff",
                        "input-bg-dark": "#1e2625",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    backgroundImage: {
                        'custom-gradient': 'linear-gradient(180deg, #58A39B 0%, #58A39B 41%, #92B3A9 81%, #f6f7f7 100%)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-light dark:text-text-dark min-h-screen flex flex-col antialiased">
<!-- Gradient Background Header -->
<div class="fixed top-0 left-0 right-0 h-64 bg-custom-gradient z-0"></div>
<!-- Main Container -->
<div class="relative z-10 flex flex-col h-full w-full max-w-md mx-auto bg-transparent">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-4 pt-12 pb-6 text-white">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-3xl">chevron_left</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Add Shop Details</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full opacity-0">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Scrollable Content Area -->
<main class="flex-1 overflow-y-auto no-scrollbar px-4 pb-32">
<!-- White Card Container -->
<div class="bg-white dark:bg-[#1e2625] rounded-3xl shadow-sm p-6 flex flex-col gap-6">
<!-- Logo Upload -->
<div class="flex flex-col items-center gap-4">
<div class="relative group cursor-pointer">
<div class="w-24 h-24 rounded-full bg-background-light dark:bg-background-dark border-2 border-dashed border-primary/40 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary text-3xl">add_a_photo</span>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full shadow-md flex items-center justify-center">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
<div class="text-center">
<p class="text-sm font-semibold text-text-light dark:text-text-dark">Shop Logo</p>
<p class="text-xs text-gray-500 dark:text-gray-400">Optional</p>
</div>
</div>
<hr class="border-gray-100 dark:border-gray-800"/>
<!-- Basic Info Section -->
<section class="flex flex-col gap-5">
<h3 class="text-lg font-bold flex items-center gap-2 text-primary">
<span class="material-symbols-outlined">storefront</span>
                        Basic Info
                    </h3>
<!-- Shop Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Shop Name</label>
<input class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400" placeholder="e.g. Bella Boutique" type="text"/>
</div>
<!-- GSTIN -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">GSTIN</label>
<div class="relative">
<input class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base uppercase placeholder:text-gray-400" placeholder="22AAAAA0000A1Z5" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400">qr_code_scanner</span>
</div>
</div>
</section>
<hr class="border-gray-100 dark:border-gray-800"/>
<!-- Address Section -->
<section class="flex flex-col gap-5">
<h3 class="text-lg font-bold flex items-center gap-2 text-primary">
<span class="material-symbols-outlined">location_on</span>
                        Location
                    </h3>
<!-- Street Address -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Street Address</label>
<textarea class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base resize-none placeholder:text-gray-400" placeholder="Flat, House no., Building, Company, Apartment" rows="2"></textarea>
</div>
<!-- City & State Row -->
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">City</label>
<input class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400" placeholder="Mumbai" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">State</label>
<div class="relative">
<select class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base appearance-none text-gray-700 dark:text-gray-200">
<option disabled="" selected="" value="">Select</option>
<option>Maharashtra</option>
<option>Delhi</option>
<option>Karnataka</option>
<option>Tamil Nadu</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined pointer-events-none text-gray-500 text-xl">expand_more</span>
</div>
</div>
</div>
<!-- Pincode -->
<div class="flex flex-col gap-1.5 w-1/2 pr-2">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Pincode</label>
<input class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400" maxlength="6" placeholder="400001" type="tel"/>
</div>
</section>
<hr class="border-gray-100 dark:border-gray-800"/>
<!-- Contact Section -->
<section class="flex flex-col gap-5">
<h3 class="text-lg font-bold flex items-center gap-2 text-primary">
<span class="material-symbols-outlined">contact_phone</span>
                        Contact
                    </h3>
<!-- Contact Person -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Contact Person</label>
<input class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400" placeholder="Full Name" type="text"/>
</div>
<!-- Mobile -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Mobile Number</label>
<div class="flex">
<div class="flex items-center justify-center px-4 bg-background-light dark:bg-background-dark border border-r-0 border-input-border-light dark:border-input-border-dark rounded-l-xl text-gray-500 font-medium">
                                +91
                            </div>
<input class="w-full px-4 py-3.5 rounded-r-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400" maxlength="10" placeholder="98765 43210" type="tel"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-gray-700 dark:text-gray-300">Email Address</label>
<input class="w-full px-4 py-3.5 rounded-xl border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400" placeholder="shop@example.com" type="email"/>
</div>
</section>
<!-- Spacing for bottom button visibility -->
<div class="h-8"></div>
</div>
<div class="h-24"></div> <!-- Extra spacing for safe area -->
</main>
<!-- Floating Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-[#161c1b]/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 z-20 max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold text-lg py-4 rounded-xl shadow-lg shadow-primary/30 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
                Save Shop Details
            </button>
</div>
</div>
</body></html>
